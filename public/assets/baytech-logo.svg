<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1626 173" role="img" aria-labelledby="baytech-logo-title" style="color:#e6e1e5;--baytech-logo-accent:#7bc144">
  <title id="baytech-logo-title">Baytech</title>
  <style>
    .baytech-logo-main { fill: currentColor; }
    .baytech-logo-accent { fill: var(--baytech-logo-accent, #7bc144); }
  </style>
  <defs>
    <mask id="baytech-logo-main-mask" maskUnits="userSpaceOnUse" x="0" y="0" width="1626" height="173" style="mask-type: alpha;">
      <image href="data:image/png;base64," x="0" y="0" width="1626" height="173"/>
    </mask>
    <mask id="baytech-logo-accent-mask" maskUnits="userSpaceOnUse" x="0" y="0" width="1626" height="173" style="mask-type: alpha;">
      <image href="data:image/png;base64," x="0" y="0" width="1626" height="173"/>
    </mask>
    <symbol id="baytech-logo" viewBox="0 0 1626 173">
      <rect class="baytech-logo-main" fill="currentColor" width="1626" height="173" mask="url(#baytech-logo-main-mask)"/>
      <rect class="baytech-logo-accent" fill="var(--baytech-logo-accent, #7bc144)" width="1626" height="173" mask="url(#baytech-logo-accent-mask)"/>
    </symbol>
  </defs>
  <use href="#baytech-logo"/>
</svg>
