<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 238 173" role="img" aria-labelledby="baytech-logo-mark-title" style="color:#e6e1e5;--baytech-logo-accent:#7bc144">
  <title id="baytech-logo-mark-title">Baytech mark</title>
  <style>
    .baytech-logo-main { fill: currentColor; }
  </style>
  <defs>
    <mask id="baytech-logo-mark-main-mask" maskUnits="userSpaceOnUse" x="0" y="0" width="238" height="173" style="mask-type: alpha;">
      <image href="data:image/png;base64," x="0" y="0" width="238" height="173"/>
    </mask>
    <symbol id="baytech-logo-mark" viewBox="0 0 238 173">
      <rect class="baytech-logo-main" fill="currentColor" width="238" height="173" mask="url(#baytech-logo-mark-main-mask)"/>
